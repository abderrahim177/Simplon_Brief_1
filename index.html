<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botique de jeux</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ThemMode.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=swords" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body >
   <!-- Header -->
<header class="flex justify-between w-full p-4 items-center bg-white shadow sticky top-0 z-10">
    <h1 class="text-3xl font-bold ">Game<span class="text-blue-600">Vault</span></h1>
    <nav class="flex gap-6 items-center"> 
        
        <button id="dark_mode_toggle" class="bg-gray-700 text-lg text-gray-200 placeholder:text-gray-200 rounded-2xl shadow-xl py-1 px-1 w-[80px] focus:outline-none focus:ring-2 focus:ring-blue-500">
                🌙 Dark
        </button>
        <i class="fa-solid fa-circle-user text-3xl text-gray-600 cursor-pointer"></i>
        <div class="relative cursor-pointer">
            <i id="cart_icon" class="fa-solid fa-bag-shopping text-3xl text-blue-500"></i>
            <!-- Counter badge -->
            <span id="cart_count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 rounded-full">0</span>
        </div>
    </nav>
</header>
<!-- Cart Modal -->
<div id="cart_modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-center z-50">
    <div class="bg-white p-6 rounded-xl w-96 h-[80vh] w-[60%] flex flex-col justify-between ">
        <div class="overflow-y-scroll no-scrollbar">
        <h2 class="text-xl font-bold mb-4">Mon Panier</h2>
        <div id="cart_items" class="space-y-2 max-h-96  ">
            
        </div>
        </div>
        <button id="close_cart" class="mt-4 w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Fermer</button>
    </div>
</div>
    <!-- Main -->
    <main class="flex flex-col items-center mt-10 w-full ">
        <!-- Search -->
         
        <article class="w-[90%] mb-10">
            
        <input  id="search_input"class="bg-gray-200 text-lg text-gray-700 placeholder:text-gray-500 rounded-md py-3 px-4 w-full focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" placeholder=" 🔍 Search For Games . . .">
        </article>
        <section class="
        w-[100%] md:w-[60%] md:mx-auto 
        flex flex-wrap gap-2 md:gap-4 justify-center md:justify-between mb-[20px]
        sticky top-[60px] z-10 bg-white py-2
        md:static md:bg-transparent md:shadow-none
        ">

<button data-cat="all" class="button flex items-center gap-2 bg-blue-400 px-3 py-2 rounded hover:bg-blue-500 hover:text-white">
  🧩 <span>All</span>
</button>   

<button data-cat="Action" class="button flex items-center gap-2 bg-gray-200 px-4 py-2 rounded hover:bg-blue-500 hover:text-white">
  ⚔️ <span>Action</span>
</button>

<button data-cat="RPG" class="button flex items-center gap-2 bg-gray-200 px-4 py-2 rounded hover:bg-blue-500 hover:text-white">
  🧙‍♂️ <span>RPG</span>
</button>

<button data-cat="FPS" class="button flex items-center gap-2 bg-gray-200 px-4 py-2 rounded hover:bg-blue-500 hover:text-white">
  🔫 <span>FPS</span>
</button> 

<button data-cat="Sport" class="button flex items-center gap-2 bg-gray-200 px-4 py-2 rounded hover:bg-blue-500 hover:text-white">
  ⚽ <span>Sport</span>
</button>

</section>
        <!-- Slider -->
        <section class="w-[90%] relative">
            <section id="image_slider" 
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-[100%] mx-auto">
        </section>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
