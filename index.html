<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botique de jeux</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script>
    tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ThemMode.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=swords" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">
    <script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body >
   <!-- Header -->
<header class="flex justify-between w-full p-4 items-center bg-white shadow sticky top-0 z-10 backdrop-blur-lg  ">
    <div class="flex items-center gap-2">
    <h1 class="text-3xl font-bold text-gray-600">Game<span class="text-blue-600">Vault</span></h1>
     <i class="fa-solid fa-gamepad text-5xl text-blue-600"></i>
    </div>
    <nav class="flex gap-6 items-center"> 
        <!-- <button id="dark_mode_toggle" class="bg-gray-700 text-lg text-gray-200 placeholder:text-gray-200 rounded-2xl shadow-xl py-1 px-1 w-[80px] focus:outline-none focus:ring-2 focus:ring-blue-500">
                🌙 Dark
        </button> -->
        <i class="fa-solid fa-circle-user text-3xl text-gray-600 cursor-pointer"></i>
        <div class="relative cursor-pointer">
            <i id="cart_icon" class="fa-solid fa-bag-shopping text-3xl text-blue-500"></i>
            <!-- Counter badge -->
            <span id="cart_count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 rounded-full">0</span>
        </div>
    </nav>
</header>
<!-- Cart Modal -->
<div id="cart_modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-center z-50">
    <div class="bg-white p-6 rounded-xl w-96 h-[80vh] w-[60%] flex flex-col justify-between ">
        <div class="overflow-y-scroll no-scrollbar">
            <div class="flex justify-end items-center relative">
                <i id="close_cart" class="fa-solid fa-circle-xmark text-2xl text-gray-500 hover:text-gray-700 cursor-pointer absolute top-0 right-0"></i>
            </div>
        <h2 class="text-xl font-bold mb-4">Mon Panier</h2>
        <div id="cart_items" class="space-y-2 max-h-96  ">
            
        </div>
        </div>
        <div>
        <div class="mt-4 flex justify-between items-center p-1 border-t">
        <h3 class="text-lg font-bold">Total: $<span id="cart_total">0</span></h3>
        <button id="commander" class="mt-2 w-[200px] bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700">Commander</button>
        </div>
        <!-- <button id="close_cart" class="mt-4 w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Fermer</button> -->
    </div>
    </div>
</div>
    <!-- Main -->
    <main class="flex flex-col items-center mt-10 w-full ">
        <!-- Search -->
         
        <article class="w-[90%] mb-10 relative">
    <input id="search_input" class=" text-lg text-gray-700 bg-gray-200 placeholder:text-gray-500 rounded-md py-3 px-4 w-full md:w-[80%] md:ml-[9rem] focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" placeholder=" 🔍 Search For Games . . .">
</article>

<!-- Desktop sidebar -->
<section class="mb-4 flex md:fixed md:top-[87px] md:left-0 md:flex-col justify-start  items-center w-[100%] gap-1 md:gap-[30px] md:w-48 md:h-full md:transition-all md:duration-300 md:bg-white/30 md:backdrop-blur-md md:shadow-lg md:rounded-r-2xl md:p-2 md:z-20 md:group md:overflow-hidden overflow-x-auto no-scrollbar">
   
    <h3 class="hidden md:block text-[25px] font-bold mb-2 flex items-center  w-full md:group">
        <i class="fa fa-list transition-opacity"></i>
        <span>Catégories</span>
    </h3>

    <button data-cat="all" class="bg-gray-200 md:bg-white button flex items-center md:w-full gap-2 md:-gap-0 px-3 py-2 md:py-0 rounded hover:bg-blue-500 text-black transition-all">
        <p class="text-[25px]">🧩</p> <span class="md:text-[18px] font-semibold overflow-hidden whitespace-nowrap">All</span>
    </button>

    <button data-cat="Action" class="bg-gray-200 md:bg-white button flex items-center md:w-full gap-2 md:-gap-0 px-3 py-2 md:py-0  rounded hover:bg-blue-500 text-black transition-all">
        <p class="text-[25px]">⚔️</p> <span class="md:text-[18px] font-semibold overflow-hidden whitespace-nowrap">Action</span>
    </button>

    <button data-cat="RPG" class="bg-gray-200 md:bg-white button flex items-center md:w-full gap-2 md:-gap-0 px-3 py-2 md:py-0 rounded hover:bg-blue-500 text-black transition-all">
        <p class="text-[25px]">🧙‍♂️</p> <span class="md:text-[18px] font-semibold overflow-hidden whitespace-nowrap">RPG</span>
    </button>

    <button data-cat="FPS" class="bg-gray-200 md:bg-white button flex items-center md:w-full gap-2 md:-gap-0 px-3 py-2 md:py-0 rounded hover:bg-blue-500 text-black transition-all">
        <p class="text-[25px]">🔫</p> <span class="md:text-[18px] font-semibold overflow-hidden whitespace-nowrap">FPS</span>
    </button>

    <button data-cat="Sport" class="bg-gray-200 md:bg-white button flex items-center md:w-full gap-2 md:-gap-0 px-3 py-2 md:py-0  rounded hover:bg-blue-500 text-black transition-all">
        <p class="text-[25px]">⚽</p> <span class="md:text-[18px] font-semibold overflow-hidden whitespace-nowrap">Sport</span>
    </button>

</section>
        <!-- Slider -->
        <section class="w-[90%] relative">
          <section id="image_slider" 
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 md:w-[calc(100%-4rem)] md:ml-[8rem]  md:mx-auto transition-all duration-300">
        </section>
        </section>
             <p>
    <i id="scrollTopBtn"
        class="fa-solid fa-arrow-up fixed bottom-[40px] right-[40px] bg-blue-500 text-white p-3 w-[40px] h-[40px] text-center rounded-full cursor-pointer hidden">
    </i>
    </p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
